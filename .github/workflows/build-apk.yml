name: 🤖 Build JARVIS APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: false
        default: '25.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ✅ Accept Licenses
        run: yes | sdkmanager --licenses || true

      - name: 🔑 Decode Keystore
        run: |
          mkdir -p android-apk/app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android-apk/app/keystore/jarvis.keystore

      - name: 🔨 Build Release APK
        working-directory: android-apk
        env:
          KEYSTORE_PATH: keystore/jarvis.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: 📦 Find & Copy APK
        run: |
          VERSION="${{ github.event.inputs.version || '25.0.0' }}"
          APK=$(find android-apk -name "*release*.apk" | head -1)
          echo "APK found: $APK"
          cp "$APK" "JARVIS-v${VERSION}.apk"
          ls -la JARVIS-*.apk

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-APK-v${{ github.event.inputs.version || '25.0.0' }}
          path: JARVIS-*.apk
          retention-days: 30

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-v${{ github.event.inputs.version || '25.0.0' }}
          name: JARVIS APK v${{ github.event.inputs.version || '25.0.0' }}
          body: |
            ## JARVIS APK
            Install → Full-screen JARVIS → Auto-updates hote rehte hain!
            PWA: https://apple-v20.vercel.app
          files: JARVIS-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
