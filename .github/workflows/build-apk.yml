# .github/workflows/build-apk.yml
# JARVIS APK Builder — GitHub Actions (FREE)
# Triggers: manual dispatch OR when twa/ folder changes
# Downloads APK from Actions → Artifacts tab (no PC needed!)

name: 🤖 Build JARVIS APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g. 25.1.0)'
        required: false
        default: '25.0.0'
  push:
    branches: [main]
    paths:
      - 'twa/**'
      - 'public/manifest.json'
      - 'public/.well-known/assetlinks.json'

jobs:
  build-apk:
    name: Build & Sign APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ───────────────────────────────────────
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      # ── 2. Java 17 (required by Gradle/Android SDK) ───────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node.js 18 (for Bubblewrap CLI) ────────────────
      - name: 🟢 Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'twa/package-lock.json'

      # ── 4. Install Bubblewrap (Google's official TWA builder)
      - name: 📦 Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@1.22.2

      # ── 5. Setup Android SDK ──────────────────────────────
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 6. Accept Android licenses ────────────────────────
      - name: ✅ Accept Android licenses
        run: yes | sdkmanager --licenses || true

      # ── 7. Decode keystore from secret ────────────────────
      - name: 🔑 Decode signing keystore
        run: |
          mkdir -p twa/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > twa/keystore/jarvis.keystore

      # ── 8. Build APK ─────────────────────────────────────
      - name: 🔨 Build APK with Bubblewrap
        working-directory: twa
        env:
          BUBBLEWRAP_KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          bubblewrap build --skipPwaValidation

      # ── 9. Rename APK with version ─────────────────────────
      - name: 📝 Rename APK
        run: |
          VERSION="${{ github.event.inputs.version || '25.0.0' }}"
          mv twa/app-release-signed.apk twa/JARVIS-v${VERSION}.apk || \
          mv twa/*.apk twa/JARVIS-v${VERSION}.apk || true
          ls twa/*.apk

      # ── 10. Upload APK as artifact ────────────────────────
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-APK-v${{ github.event.inputs.version || '25.0.0' }}
          path: twa/JARVIS-*.apk
          retention-days: 30

      # ── 11. Create Release (on manual trigger) ────────────
      - name: 🚀 Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version || '25.0.0' }}
          name: JARVIS v${{ github.event.inputs.version || '25.0.0' }}
          body: |
            ## JARVIS APK — Trusted Web Activity
            
            **PWA URL:** https://apple-v20.vercel.app
            **Auto-updates:** Yes — app always loads latest PWA
            **Min Android:** 5.0 (API 21)
            
            ### Install
            1. Download `JARVIS-*.apk`
            2. Enable "Install from unknown sources" in Android settings
            3. Install APK
            4. JARVIS runs fullscreen — no browser UI!
          files: twa/JARVIS-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
