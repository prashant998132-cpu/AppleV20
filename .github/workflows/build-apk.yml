name: 🤖 Build JARVIS APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 25.0.0)'
        required: false
        default: '25.0.0'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🟢 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install Bubblewrap
        run: npm install -g @bubblewrap/cli@1.22.2

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ✅ Accept Licenses
        run: yes | sdkmanager --licenses || true

      - name: 🔑 Decode Keystore
        run: |
          mkdir -p twa/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > twa/keystore/jarvis.keystore

      - name: 🏗️ Init Bubblewrap Project
        working-directory: twa
        run: |
          bubblewrap init --manifest https://apple-v20.vercel.app/manifest.json --directory . --skipPwaValidation || true

      - name: ⚙️ Patch signing config
        run: |
          python3 -c "
          import json
          f = 'twa/twa-manifest.json'
          d = json.load(open(f))
          d['signingKey'] = {'path': 'keystore/jarvis.keystore', 'alias': 'jarvis'}
          json.dump(d, open(f,'w'), indent=2)
          print('patched')
          "

      - name: 🔨 Build APK
        working-directory: twa
        env:
          BUBBLEWRAP_KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: bubblewrap build --skipPwaValidation

      - name: 📝 Find APK
        run: |
          VERSION="${{ github.event.inputs.version || '25.0.0' }}"
          APK=$(find twa -name "*.apk" | head -1)
          echo "APK: $APK"
          cp "$APK" "JARVIS-v${VERSION}.apk"

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-APK-v${{ github.event.inputs.version || '25.0.0' }}
          path: JARVIS-*.apk
          retention-days: 30

      - name: 🚀 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-v${{ github.event.inputs.version || '25.0.0' }}
          name: JARVIS APK v${{ github.event.inputs.version || '25.0.0' }}
          body: |
            JARVIS APK - Trusted Web Activity
            PWA: https://apple-v20.vercel.app
            Auto-updates included!
          files: JARVIS-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
