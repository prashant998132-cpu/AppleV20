name: 🤖 Build JARVIS APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: false
        default: '25.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ✅ Accept Licenses
        run: yes | sdkmanager --licenses || true

      - name: 🔑 Decode Keystore
        working-directory: android-apk
        run: |
          mkdir -p app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore/jarvis.keystore

      - name: 🔧 Setup Gradle wrapper
        working-directory: android-apk
        run: |
          gradle wrapper --gradle-version 8.2 || true
          chmod +x gradlew 2>/dev/null || true

      - name: 🔨 Build Release APK
        working-directory: android-apk
        env:
          KEYSTORE_PATH: keystore/jarvis.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Download gradle wrapper if not present
          if [ ! -f "gradlew" ]; then
            curl -L https://services.gradle.org/distributions/gradle-8.2-bin.zip -o gradle.zip
            unzip -q gradle.zip
            ./gradle-8.2/bin/gradle wrapper
          fi
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: 📝 Rename APK
        run: |
          VERSION="${{ github.event.inputs.version || '25.0.0' }}"
          APK=$(find android-apk -name "*release*.apk" | head -1)
          echo "Found: $APK"
          cp "$APK" "JARVIS-v${VERSION}.apk"

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-APK-v${{ github.event.inputs.version || '25.0.0' }}
          path: JARVIS-*.apk
          retention-days: 30

      - name: 🚀 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-v${{ github.event.inputs.version || '25.0.0' }}
          name: JARVIS APK v${{ github.event.inputs.version || '25.0.0' }}
          body: |
            JARVIS APK — Full-screen Android App
            PWA: https://apple-v20.vercel.app
            Auto-updates bhi hain!
          files: JARVIS-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
