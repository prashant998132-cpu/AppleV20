name: 🤖 Build JARVIS APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 25.0.0)'
        required: false
        default: '25.0.0'
  push:
    branches: [main]
    paths:
      - 'twa/**'
      - 'public/.well-known/assetlinks.json'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🟢 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@1.22.2

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ✅ Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: 🔑 Decode keystore
        run: |
          mkdir -p twa/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > twa/keystore/jarvis.keystore

      - name: 🔨 Build APK
        working-directory: twa
        env:
          BUBBLEWRAP_KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: bubblewrap build --skipPwaValidation

      - name: 📝 Rename APK
        run: |
          VERSION="${{ github.event.inputs.version || '25.0.0' }}"
          find twa -name "*.apk" | head -1 | xargs -I{} mv {} twa/JARVIS-v${VERSION}.apk
          ls twa/*.apk

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-APK-v${{ github.event.inputs.version || '25.0.0' }}
          path: twa/JARVIS-*.apk
          retention-days: 30

      - name: 🚀 Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version || '25.0.0' }}
          name: JARVIS v${{ github.event.inputs.version || '25.0.0' }}
          body: |
            ## JARVIS APK — Trusted Web Activity
            PWA: https://apple-v20.vercel.app
            Auto-updates: Haan — APK hamesha latest PWA load karta hai
            Min Android: 5.0 (API 21)
          files: twa/JARVIS-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
