plugins {
    id 'com.android.application'
}

android {
    namespace 'com.jarvis.jons_bhai'
    compileSdk 34

    defaultConfig {
        applicationId "com.jarvis.jons_bhai"
        minSdk 21
        targetSdk 34
        versionCode 25
        versionName "25.0.0"
    }

    signingConfigs {
        release {
            storeFile file(System.getenv("KEYSTORE_PATH") ?: "keystore/jarvis.keystore")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: "jarvis2025"
            keyAlias "jarvis"
            keyPassword System.getenv("KEY_PASSWORD") ?: "jarvis2025"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
