<!DOCTYPE html>
<html lang="hi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>JARVIS — Offline</title>
<style>body{margin:0;background:#090d18;color:#ddeeff;font-family:Inter,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px}.logo{font-size:48px;color:rgba(0,229,255,.3)}.title{font-size:20px;font-weight:700;letter-spacing:3px;color:#e8f4ff}.sub{font-size:13px;color:#1e3858;text-align:center;max-width:280px;line-height:1.6}.dot{width:8px;height:8px;border-radius:50%;background:#ff4444;display:inline-block;margin-right:6px}</style>
</head>
<body>
<div class="logo">⬡</div>
<div class="title">JARVIS</div>
<span><span class="dot"></span>Offline</span>
<div class="sub">Internet नहीं है। Online होने पर JARVIS automatically reconnect होगा।</div>
<script>window.addEventListener('online',()=>location.reload())</script>
</body></html>
